    // Function which will execute again and again
    
    const print = function () {
            console.log("Messi", Date.now());
        }


        let intervalId= true;


        // Start button
        document.getElementById('Start').addEventListener('click', function () {

            // prevent multiple intervals
            if (intervalId) {
                intervalId = setInterval(print, 2000);
            }

        });


        // Stop button
        document.getElementById('stop').addEventListener('click', function () {

            clearInterval(intervalId);

            // reset intervalId
            intervalId = null;

        });



</script>
